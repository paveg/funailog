name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.cursor/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.cursor/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint系を並列実行
      - name: Lint (parallel)
        run: |
          pnpm run format:check &
          pnpm exec eslint --cache . &
          pnpm run lint:md &
          pnpm run validate:content &
          wait

      # 型チェック系を並列実行
      - name: Type check (parallel)
        run: |
          pnpm run check &
          pnpm exec tsc --noEmit &
          wait

      - name: Build
        run: pnpm run build

      - name: a11y check (axe-core)
        run: |
          pnpm preview --host 127.0.0.1 &
          sleep 3
          pnpm exec axe \
            http://localhost:4321/ \
            http://localhost:4321/blog/2025/zod-to-valibot-migration \
            http://localhost:4321/blog/2025/modern-edge-tech-stack \
            http://localhost:4321/blog/2024/review-monitors-u4025qw-dell \
            http://localhost:4321/about \
            --exit
          kill %1 || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
