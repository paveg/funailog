        star:
          - situation: |
              マルチプロダクトにもかかわらず、顧客が特定のプロダクトを使い始める際に
              無関係なプロダクトの登録導線を踏む必要があった。マスタデータと権限管理の
              密結合がパフォーマンス問題・開発生産性の低下を引き起こしていた。
              基盤として切り出す情報が人事労務プロダクト（大規模モノリス）に
              密結合しており、各機能のオーナーチームとの調整が不可欠だった。
            task: |
              アーキテクトとしてドメイン境界の定義、技術戦略・ロードマップの策定を主導。
              認証基盤チーム・各機能オーナーチーム・品質チーム・ビジネスサイドを横断した合意形成。
