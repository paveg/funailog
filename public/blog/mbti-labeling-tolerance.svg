<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc" font-family="system-ui, -apple-system, 'Hiragino Sans', sans-serif">
  <title id="title">日常会話でのラベリング許容度の比較</title>
  <desc id="desc">性的指向・人種・血液型によるラベリングは社会的に許容されにくいが、MBTIによるラベリングは高く許容されている、という非対称性を示す横棒グラフ。</desc>

  <style>
    .bg { fill: transparent; }
    .axis { stroke: currentColor; stroke-width: 1; opacity: 0.25; }
    .label { fill: currentColor; font-size: 14px; }
    .value { fill: currentColor; font-size: 12px; opacity: 0.7; }
    .caption { fill: currentColor; font-size: 12px; opacity: 0.6; }
    .bar-muted { fill: currentColor; opacity: 0.25; }
    .bar-accent { fill: #e11d48; }
    .headline { fill: currentColor; font-size: 16px; font-weight: 600; }
    .note { fill: currentColor; font-size: 11px; opacity: 0.55; }
  </style>

  <rect class="bg" width="720" height="420"/>

  <!-- Title -->
  <text class="headline" x="40" y="36">日常会話での他者ラベリング許容度</text>
  <text class="caption" x="40" y="56">「◯◯っぽいよね」と他人に言うことが、その場で許容されるか</text>

  <!-- Axis -->
  <line class="axis" x1="220" y1="90" x2="220" y2="340"/>
  <line class="axis" x1="220" y1="340" x2="680" y2="340"/>

  <!-- Axis ticks (low → high) -->
  <text class="value" x="220" y="360" text-anchor="middle">低</text>
  <text class="value" x="450" y="360" text-anchor="middle">→</text>
  <text class="value" x="680" y="360" text-anchor="middle">高</text>

  <!-- Bars -->
  <!-- 性的指向 -->
  <text class="label" x="210" y="118" text-anchor="end">性的指向</text>
  <rect class="bar-muted" x="220" y="100" width="60" height="26" rx="3"/>

  <!-- 人種・出身地 -->
  <text class="label" x="210" y="168" text-anchor="end">人種・出身地</text>
  <rect class="bar-muted" x="220" y="150" width="90" height="26" rx="3"/>

  <!-- 血液型 -->
  <text class="label" x="210" y="218" text-anchor="end">血液型</text>
  <rect class="bar-muted" x="220" y="200" width="150" height="26" rx="3"/>

  <!-- MBTI (accent) -->
  <text class="label" x="210" y="268" text-anchor="end" font-weight="600">MBTI</text>
  <rect class="bar-accent" x="220" y="250" width="430" height="26" rx="3"/>
  <text class="value" x="660" y="268" fill="#e11d48" font-weight="600">突出</text>

  <!-- Annotation -->
  <line class="axis" x1="650" y1="276" x2="650" y2="310" stroke-dasharray="3 3"/>
  <text class="note" x="644" y="326" text-anchor="end">生得的・固定的とされる属性で他者を括る点は同じ構造</text>

  <!-- Footer -->
  <text class="caption" x="40" y="400">※ 実測ではなく、社会通念に基づくイメージ。記事本文の主張を視覚化したもの。</text>
</svg>
