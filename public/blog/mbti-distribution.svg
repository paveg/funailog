<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" role="img" aria-labelledby="title desc" font-family="system-ui, -apple-system, 'Hiragino Sans', sans-serif">
  <title id="title">MBTI理論の前提分布と実データ分布の比較</title>
  <desc id="desc">MBTI理論はタイプが実在する=二峰性分布を前提とするが、実データの得点分布は単峰性(正規分布に近い)であることを示す2枚並びのチャート。Pittenger 2005。</desc>

  <style>
    .bg { fill: transparent; }
    .axis { stroke: currentColor; stroke-width: 1; opacity: 0.35; }
    .grid { stroke: currentColor; stroke-width: 1; opacity: 0.12; }
    .label { fill: currentColor; font-size: 13px; }
    .title { fill: currentColor; font-size: 15px; font-weight: 600; }
    .caption { fill: currentColor; font-size: 12px; opacity: 0.65; }
    .note { fill: currentColor; font-size: 11px; opacity: 0.6; }
    .curve-theory { fill: none; stroke: currentColor; stroke-width: 2.2; opacity: 0.5; }
    .curve-real { fill: none; stroke: #e11d48; stroke-width: 2.4; }
    .divider { stroke: #e11d48; stroke-width: 1.2; stroke-dasharray: 4 3; opacity: 0.75; }
    .annotation { fill: #e11d48; font-size: 11px; font-weight: 600; }
    .headline { fill: currentColor; font-size: 16px; font-weight: 600; }
  </style>

  <rect class="bg" width="800" height="440"/>

  <!-- Top title -->
  <text class="headline" x="40" y="34">得点分布：理論上の前提 vs 実データ</text>
  <text class="caption" x="40" y="54">タイプが実在するなら双峰分布になるはず。実際は単峰分布に近い（Pittenger, 2005）。</text>

  <!-- LEFT PANEL: 理論 (bimodal) -->
  <g transform="translate(40, 90)">
    <text class="title" x="170" y="-4" text-anchor="middle">理論（MBTIの前提）</text>
    <text class="caption" x="170" y="14" text-anchor="middle">タイプが質的に分かれる = 双峰分布</text>

    <!-- axes -->
    <line class="axis" x1="20" y1="240" x2="320" y2="240"/>
    <line class="axis" x1="20" y1="40" x2="20" y2="240"/>

    <!-- grid (subtle) -->
    <line class="grid" x1="20" y1="100" x2="320" y2="100"/>
    <line class="grid" x1="20" y1="160" x2="320" y2="160"/>

    <!-- bimodal curve: two humps centered at 105 and 235 -->
    <path class="curve-theory" d="
      M 20 240
      C 50 240, 70 200, 105 80
      C 140 200, 155 220, 170 220
      C 185 220, 200 200, 235 80
      C 270 200, 290 240, 320 240
    "/>

    <!-- axis labels -->
    <text class="label" x="105" y="260" text-anchor="middle">内向型</text>
    <text class="label" x="235" y="260" text-anchor="middle">外向型</text>
    <text class="caption" x="170" y="280" text-anchor="middle">得点（低 ← → 高）</text>
  </g>

  <!-- RIGHT PANEL: 実データ (unimodal) -->
  <g transform="translate(440, 90)">
    <text class="title" x="170" y="-4" text-anchor="middle">実データ</text>
    <text class="caption" x="170" y="14" text-anchor="middle">単峰分布（正規分布に近い）</text>

    <!-- axes -->
    <line class="axis" x1="20" y1="240" x2="320" y2="240"/>
    <line class="axis" x1="20" y1="40" x2="20" y2="240"/>

    <!-- grid -->
    <line class="grid" x1="20" y1="100" x2="320" y2="100"/>
    <line class="grid" x1="20" y1="160" x2="320" y2="160"/>

    <!-- Normal-ish curve centered at 170 -->
    <path class="curve-real" d="
      M 20 240
      C 60 240, 100 235, 130 180
      C 150 120, 165 70, 170 65
      C 175 70, 190 120, 210 180
      C 240 235, 280 240, 320 240
    "/>

    <!-- cut-off divider at 50% -->
    <line class="divider" x1="170" y1="40" x2="170" y2="240"/>
    <text class="annotation" x="170" y="36" text-anchor="middle">ここで2タイプに分断</text>

    <!-- percentile arrows -->
    <g font-size="10" fill="currentColor" opacity="0.8">
      <text x="150" y="215" text-anchor="end">49pct</text>
      <line class="axis" x1="155" y1="210" x2="168" y2="210"/>
      <text x="190" y="215" text-anchor="start">51pct</text>
      <line class="axis" x1="172" y1="210" x2="185" y2="210"/>
    </g>

    <!-- axis labels -->
    <text class="label" x="105" y="260" text-anchor="middle">内向型と分類</text>
    <text class="label" x="235" y="260" text-anchor="middle">外向型と分類</text>
    <text class="caption" x="170" y="280" text-anchor="middle">得点（低 ← → 高）</text>
  </g>

  <!-- Footer -->
  <text class="note" x="40" y="418">出典: Pittenger, D. J. (2005). Cautionary Comments Regarding the Myers-Briggs Type Indicator.</text>
</svg>
